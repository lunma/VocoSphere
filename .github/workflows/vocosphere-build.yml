name: VocoSphere Build # GitHub Actions 工作流名称：Tauri 应用编译

on:
  # 触发条件：推送 / PR 到 main 分支，或手动触发，或推送 tag 时创建 Release
  push:
    branches: [main]
    tags:
      - 'v*' # 匹配 v 开头的版本标签，如 v1.0.0
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  # 对于 tag 推送：使用统一的组，新 tag 会取消旧的构建
  # 对于分支推送：使用独立的组，可以并行
  group: ${{ github.workflow }}-${{ startsWith(github.ref, 'refs/tags/') && 'tags' || github.ref }}
  cancel-in-progress: ${{ startsWith(github.ref, 'refs/tags/') }}  # tag 推送时取消旧的构建
jobs:
  build:
    name: Build on ${{ matrix.platform }} # 按操作系统矩阵分别构建
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - macos-latest
          - ubuntu-latest
          - windows-latest

    env:
      # 显式设置可以确保在所有场景下都使用生产模式（代码压缩、tree-shaking 等）
      NODE_ENV: "production"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.23.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.21.1
          cache: "pnpm"

      - name: Install system dependencies (Linux only)
        if: matrix.platform == 'ubuntu-latest'
        # Ubuntu 构建环境所需的系统库
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@1.91.1
        # 安装指定版本的 Rust（含 cargo、rustup）

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2.8.0
        with:
          workspaces: |
            src-tauri -> target
          cache-on-failure: true  # 即使构建失败也保存缓存，便于调试
        # 缓存 Rust 编译产物，加速后续构建（不同平台自动使用不同的缓存 key）

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile
        # 安装前端依赖，保持 lockfile 一致

      - name: Setup ffmpeg static sidecar (macOS / Linux)
        if: matrix.platform != 'windows-latest'
        shell: bash
        run: |
          case "${{ runner.os }}-${{ runner.arch }}" in
            macOS-ARM64) TRIPLE="aarch64-apple-darwin";      ASSET="ffmpeg-darwin-arm64" ;;
            macOS-X64)   TRIPLE="x86_64-apple-darwin";       ASSET="ffmpeg-darwin-x64"   ;;
            Linux-X64)   TRIPLE="x86_64-unknown-linux-gnu";  ASSET="ffmpeg-linux-x64"    ;;
            Linux-ARM64) TRIPLE="aarch64-unknown-linux-gnu"; ASSET="ffmpeg-linux-arm64"  ;;
          esac
          mkdir -p src-tauri/binaries
          curl -L -o "src-tauri/binaries/ffmpeg-$TRIPLE" \
            "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/$ASSET"
          chmod +x "src-tauri/binaries/ffmpeg-$TRIPLE"

      - name: Setup ffmpeg static sidecar (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -Path 'src-tauri/binaries' -ItemType Directory -Force | Out-Null
          Invoke-WebRequest -Uri "https://github.com/eugeneware/ffmpeg-static/releases/download/b6.1.1/ffmpeg-win32-x64" `
            -OutFile "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: Check code formatting and lint
        run: |
          pnpm format:check
          pnpm lint

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.13
        # env:
        #   TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        #   TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        #   APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
        #   APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        #   APPLE_ID: ${{ secrets.APPLE_ID }}
        #   APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        #   APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        #   APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        with:
          projectPath: .
          tauriScript: pnpm tauri
          distPath: dist # 前端静态资源目录（Vite 构建输出）

      - name: Upload bundles
        if: always()
        uses: actions/upload-artifact@v4.4.3
        with:
          name: vocosphere-bundle-${{ matrix.platform }}
          path: src-tauri/target/release/bundle/**
          if-no-files-found: warn
        # 将各平台的打包产物上传为构建工件，便于下载测试

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    # 仅在推送 tag 时创建 Release
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write # 需要写入权限来创建 Release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # 获取所有历史记录，包括所有 tags

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts
          pattern: vocosphere-bundle-*
          merge-multiple: false

      - name: List downloaded artifacts
        run: |
          echo "📦 下载的构建产物结构："
          find ./artifacts -type f 2>/dev/null | head -20 || echo "未找到文件"
          echo ""
          echo "📁 目录结构："
          ls -laR ./artifacts 2>/dev/null | head -30 || echo "目录为空"

      - name: Check artifacts exist
        id: check-artifacts
        run: |
          ARTIFACT_COUNT=$(find ./artifacts -type f 2>/dev/null | wc -l || echo "0")
          echo "找到 $ARTIFACT_COUNT 个文件"
          if [ "$ARTIFACT_COUNT" -eq "0" ]; then
            echo "❌ 错误：未找到任何构建产物！"
            echo "请检查构建是否成功，或 artifacts 上传是否正确。"
            exit 1
          fi
          echo "✅ 找到构建产物，继续创建 Release"

      - name: Get previous tag
        id: previous-tag
        run: |
          CURRENT_TAG="${{ github.ref_name }}"
          # 获取所有 tag，按版本号排序，找到当前 tag 的上一个
          PREVIOUS_TAG=$(git tag --sort=-version:refname | grep -A 1 "^${CURRENT_TAG}$" | tail -1 || echo "")
          if [ -z "$PREVIOUS_TAG" ] || [ "$PREVIOUS_TAG" = "$CURRENT_TAG" ]; then
            # 如果没有找到上一个 tag，使用 main 分支
            echo "compare_url=https://github.com/${{ github.repository }}/compare/main...${CURRENT_TAG}" >> $GITHUB_OUTPUT
            echo "compare_text=main...${CURRENT_TAG}" >> $GITHUB_OUTPUT
          else
            echo "compare_url=https://github.com/${{ github.repository }}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}" >> $GITHUB_OUTPUT
            echo "compare_text=${PREVIOUS_TAG}...${CURRENT_TAG}" >> $GITHUB_OUTPUT
          fi

      - name: Determine release type
        id: release-type
        run: |
          TAG_NAME="${{ github.ref_name }}"
          if [[ "$TAG_NAME" == *"-draft"* ]]; then
            echo "is_draft=true" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_type=草稿" >> $GITHUB_OUTPUT
          elif [[ "$TAG_NAME" == *"-alpha"* ]] || [[ "$TAG_NAME" == *"-beta"* ]] || [[ "$TAG_NAME" == *"-rc"* ]]; then
            echo "is_draft=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
            echo "release_type=预发布" >> $GITHUB_OUTPUT
          else
            echo "is_draft=false" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
            echo "release_type=正式发布" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            ## 🎉 Release ${{ github.ref_name }} (${{ steps.release-type.outputs.release_type }})

            ### 📦 构建产物

            本次发布包含以下平台的构建产物：
            - **macOS** (.dmg / .app)
            - **Linux** (.deb / .AppImage)
            - **Windows** (.msi / .exe)

            ### 📝 变更说明
            - 查看 [提交历史](${{ steps.previous-tag.outputs.compare_url }}) (${{ steps.previous-tag.outputs.compare_text }})
          files: |
            artifacts/vocosphere-bundle-*/dmg/*.dmg
            artifacts/vocosphere-bundle-*/macos/*.app.tar.gz
            artifacts/vocosphere-bundle-*/nsis/*.exe
            artifacts/vocosphere-bundle-*/msi/*.msi
            artifacts/vocosphere-bundle-*/deb/*.deb
            artifacts/vocosphere-bundle-*/appimage/*.AppImage
          draft: ${{ steps.release-type.outputs.is_draft }}
          prerelease: ${{ steps.release-type.outputs.is_prerelease }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

